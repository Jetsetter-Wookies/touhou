<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>東方幻夢郷 ~ Phantasmal Dream Land</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0010;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh;
    font-family:'Noto Serif JP',serif;
    overflow:hidden;
  }
  #wrapper { display:flex; position:relative; }
  #gameCanvas {
    display:block;
    border:2px solid #cc44ff;
    box-shadow:0 0 20px #aa00ff88, 0 0 60px #440066;
    image-rendering:pixelated;
  }
  #sidebar {
    width:160px; background:#0d0018;
    border:2px solid #cc44ff; border-left:none;
    padding:12px 10px;
    display:flex; flex-direction:column; gap:14px;
    color:#e0c0ff;
  }
  .side-label {
    font-size:10px; color:#aa66dd; letter-spacing:2px;
    text-transform:uppercase; border-bottom:1px solid #440066;
    padding-bottom:4px; margin-bottom:6px;
  }
  .side-value { font-size:18px; color:#ffffff; font-weight:700; letter-spacing:1px; }
  .lives-display,.bombs-display { display:flex; gap:4px; flex-wrap:wrap; }
  .life-icon  { width:12px; height:12px; background:#ff44aa;
                clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
  .life-empty { background:#331133; }
  .bomb-icon  { width:10px; height:10px; background:#44aaff; border-radius:50%; border:1px solid #88ccff; }
  .bomb-empty { background:#1a2233; border-color:#334; }
  #boss-hp-bar {
    width:100%; height:6px; background:#220033;
    border:1px solid #660099; margin-top:4px; display:none;
  }
  #boss-hp-fill { height:100%; background:linear-gradient(90deg,#ff0066,#ff66cc); transition:width .1s; }

  /* ── Overlays ── */
  #title-screen,#gameover-screen,#victory-screen {
    position:absolute; top:0; left:0; width:544px; height:448px;
    background:#060010ee;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#e0c0ff; text-align:center; z-index:10;
    pointer-events:all;
  }
  .screen-title-jp { font-size:26px; color:#ffffff; font-weight:700; margin-bottom:6px; text-shadow:0 0 10px #aa44ff; }
  .screen-sub { font-size:11px; color:#9966bb; margin-bottom:30px; letter-spacing:2px; }
  .screen-btn {
    background:none; border:1px solid #cc44ff; color:#e0c0ff;
    font-family:'Noto Serif JP',serif; font-size:13px;
    padding:8px 24px; cursor:pointer; letter-spacing:3px; margin:4px;
    transition:all .15s;
  }
  .screen-btn:hover { background:#cc44ff22; color:#fff; }
  .controls-list { font-size:11px; color:#7755aa; line-height:2; margin-top:16px; }
  .controls-list span { color:#bb88ee; }
  #stage-banner {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#fff; font-size:22px; font-weight:700; text-align:center;
    pointer-events:none; z-index:5;
    text-shadow:0 0 10px #ff44aa;
    opacity:0; transition:opacity .3s; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas" width="384" height="448"></canvas>

  <div id="sidebar">
    <div class="side-section">
      <div class="side-label">SCORE</div>
      <div class="side-value" id="scoreDisplay">0</div>
    </div>
    <div class="side-section">
      <div class="side-label">HI-SCORE</div>
      <div class="side-value" id="hiScoreDisplay">100000</div>
    </div>
    <div class="side-section">
      <div class="side-label">STAGE</div>
      <div class="side-value" id="stageDisplay">1</div>
    </div>
    <div class="side-section">
      <div class="side-label">LIVES</div>
      <div class="lives-display" id="livesDisplay"></div>
    </div>
    <div class="side-section">
      <div class="side-label">BOMBS</div>
      <div class="bombs-display" id="bombsDisplay"></div>
    </div>
    <div class="side-section" id="boss-section" style="display:none">
      <div class="side-label">BOSS HP</div>
      <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    </div>
    <div class="side-section" style="margin-top:auto">
      <div class="side-label">POWER</div>
      <div class="side-value" id="powerDisplay">1.0</div>
    </div>
    <div class="side-section">
      <div class="side-label">GRAZE</div>
      <div class="side-value" id="grazeDisplay">0</div>
    </div>
  </div>

  <!-- Title -->
  <div id="title-screen">
    <div style="font-size:13px;color:#cc88ff;letter-spacing:4px;margin-bottom:4px;">PHANTASM ENTERTAINMENT PRESENTS</div>
    <div class="screen-title-jp">東方幻夢郷</div>
    <div style="font-size:14px;color:#cc88ff;margin-bottom:4px;">~ Phantasmal Dream Land ~</div>
    <div class="screen-sub">幻の夢の国へ</div>
    <button class="screen-btn" onclick="startGame()" style="border-color:#ff4444;color:#ff4444;">▶ HARD MODE</button>
    <button class="screen-btn" onclick="startEasyMode()" style="border-color:#ffdd44;color:#ffdd44;">☆ NORMAL MODE</button>
    <button class="screen-btn" onclick="startBabyMode()" style="border-color:#44ff88;color:#44ff88;">✿ BABY MODE</button>
    <button class="screen-btn" id="title-extra-btn" onclick="startExtraMode()" style="display:none;border-color:#ff88ff;color:#ff88ff;">✦ EXTRA MODE</button>
    <div class="controls-list">
      <span>Arrow Keys</span> — Move<br>
      <span>Z</span> — Shoot &nbsp;&nbsp; <span>X</span> — Bomb<br>
      <span>Shift</span> — Focus (slow + hitbox)<br>
      <span>ESC</span> — Pause
    </div>
  </div>

  <!-- Game Over -->
  <div id="gameover-screen" style="display:none">
    <div class="screen-title-jp">ゲームオーバー</div>
    <div style="font-size:14px;color:#cc88ff;margin-bottom:20px;">GAME OVER</div>
    <div id="final-score" style="font-size:20px;color:#fff;margin-bottom:20px;"></div>
    <button class="screen-btn" onclick="startGame()">▶ RETRY</button>
    <button class="screen-btn" onclick="showTitle()">TITLE</button>
  </div>

  <!-- Victory -->
  <div id="victory-screen" style="display:none">
    <div class="screen-title-jp">クリア！</div>
    <div style="font-size:14px;color:#ffcc44;margin-bottom:6px;">ALL CLEAR</div>
    <div id="victory-score" style="font-size:20px;color:#fff;margin-bottom:16px;"></div>
    <div id="extra-unlock-msg" style="font-size:11px;color:#ff88ff;letter-spacing:2px;margin-bottom:14px;display:none;">✦ EXTRA STAGE UNLOCKED ✦</div>
    <button class="screen-btn" id="extra-mode-btn" onclick="startExtraMode()" style="display:none;border-color:#ff88ff;color:#ff88ff;">✦ EXTRA MODE</button>
    <button class="screen-btn" onclick="startGame()">▶ PLAY AGAIN</button>
    <button class="screen-btn" onclick="showTitle()">TITLE</button>
  </div>

  <div id="stage-banner"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  SPRITE LOADER
//  All images live in assets/sprites/ next to this HTML file.
// ═══════════════════════════════════════════════════════════════
const SPRITES = {};
const SPRITE_FILES = {
  player:      'assets/sprites/player.png',
  enemy_a:     'assets/sprites/enemy_a.png',
  enemy_b:     'assets/sprites/enemy_b.png',
  enemy_c:     'assets/sprites/enemy_c.png',
  boss_reimu:  'assets/sprites/boss_reimu.png',
  boss_marisa: 'assets/sprites/boss_marisa.png',
  boss_sakuya: 'assets/sprites/boss_sakuya.png',
  boss_cirno:   'assets/sprites/boss_cirno.png',
  boss_yukari: 'assets/sprites/boss_yukari.png',
};
// Level palette sprites (tinted enemies per level)
for (let lvl=1;lvl<=7;lvl++) {
  ['enemy_a','enemy_b','enemy_c'].forEach(k=>{
    SPRITE_FILES[`l${lvl}_${k}`] = `assets/palettes/level${lvl}/${k}.png`;
  });
}
// Background images
for (let lvl=1;lvl<=7;lvl++) {
  SPRITE_FILES[`bg${lvl}`] = `assets/backgrounds/bg${lvl}.png`;
}

let spritesLoaded = 0;
const totalSprites = Object.keys(SPRITE_FILES).length;

function loadSprites(callback) {
  Object.entries(SPRITE_FILES).forEach(([key, src]) => {
    const img = new Image();
    img.onload  = () => { SPRITES[key] = img; spritesLoaded++; if (spritesLoaded === totalSprites) callback(); };
    img.onerror = () => { console.warn('Missing sprite:', src, '– using fallback');
                          SPRITES[key] = null; spritesLoaded++; if (spritesLoaded === totalSprites) callback(); };
    img.src = src;
  });
}

// Return palette-tinted sprite key for current stage
function palKey(base) {
  const lvl = Math.min(stage, 7);
  const pk = `l${lvl}_${base}`;
  return (SPRITES[pk]) ? pk : base;
}

// ═══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
ctx.imageSmoothingEnabled = false;   // keep sprites crisp / pixel-art

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let state = 'loading';
let extraMode = false;   // true after first clear
let easyMode  = false;   // relaxed bullet counts & speeds
let babyMode  = false;   // beginner mode with special rules
let hardMode  = false;   // 7 stages
let scrollY = 0;   // true after first clear
let score=0, hiScore=100000, graze=0, power=1.0;
let lives=3, bombs=3, frame=0, stage=1, paused=false;
let invincible=0, bombActive=0, stageTimer=0;

let player, bullets, enemies, enemyBullets, particles, items, boss, laserCharges;
let bossActive=false, bossMaxHp=1000, bossHp=1000;

const keys = {};
document.addEventListener('keydown', e=>{ keys[e.code]=true;  e.preventDefault(); });
document.addEventListener('keyup',   e=>{ keys[e.code]=false; });

// ═══════════════════════════════════════════════════════════════
//  BOSS ROSTER  (maps stage → sprite key + display name)
// ═══════════════════════════════════════════════════════════════
const BOSS_ROSTER = [
  { key:'boss_reimu',  name:'博麗 霊夢  Hakurei Reimu',   w:48, h:56,
    quip:"Don't expect me to go easy on you just because I'm the stage 1 boss.",
    defeatQuip:"H-how? I didn't even get to use my full power yet..." },
  { key:'boss_marisa', name:'霧雨 魔理沙  Kirisame Marisa', w:48, h:56,
    quip:"I borrowed some spells from a book. Don't worry about which book.",
    defeatQuip:"Ze~! That's my power you're using against me?! Not fair!" },
  { key:'boss_cirno',  name:'チルノ  Cirno',              w:48, h:56,
    quip:"⑨ I'm the strongest! You'll be frozen solid in no time!",
    defeatQuip:"N-no way! I'm the strongest! This is just a fluke!" },
  { key:'boss_yukari', name:'八雲 紫  Yakumo Yukari',      w:56, h:64,
    quip:"Oh my. A human made it this far? How novel. How unfortunate for you.",
    defeatQuip:"Fufu... how delightful. I was beginning to get bored.", newFight:true },
  { key:'boss_reimu',  name:'博麗 霊夢  Hakurei Reimu II', w:48, h:56,
    quip:"You again? Fine. I won't hold back this time.",
    defeatQuip:"This can't be real. You're cheating somehow.", newFight:true },
  { key:'boss_sakuya', name:'十六夜 咲夜  Izayoi Sakuya',  w:48, h:56,
    quip:"I can stop time, so dying to my bullets is entirely your own fault.",
    defeatQuip:"...Impossible. I stopped time and you still hit me.", newFight:true,
    teleportTaunt:"What, you think I'm just gonna sit there and take it?" },
  { key:'boss_yukari', name:'八雲 紫  Yakumo Yukari Final', w:56, h:64,
    quip:"You've come all this way. Let's see if you can survive the void.",
    defeatQuip:"...You truly are something else. This gap was not meant to be crossed.",
    newFight:true,
    teleportTaunt:"Did you really think a gap youkai would stand still for you?" },
];

// boss dialogue
let bossQuip = '';
let bossQuipSpeaker = '';
let bossQuipTimer = 0;

// Stage 3 time freeze
let timeFreeze      = false;
let timeFreezeTimer = 0;
let timeFreezeAlpha = 0;

// background scroll
let bgScrollY = 0;       // pixel offset into the bg image (increases downward = scroll up)
let bgPaused  = false;   // paused during boss fight

// defeat screen
let defeatScreen = false;
let defeatQuipText = '';
let defeatBossKey  = '';
let defeatBossW    = 48;
let defeatBossH    = 56;
let defeatScale    = 1;
let defeatAlpha    = 0;
let defeatPhase    = 0;  // 0=grow, 1=hold, 2=wait for Z

// boss teleport dodge (stages 6+)
let bossTeleporting   = false;
let bossTeleportTimer = 0;
let bossTeleportTaunt = '';
let bossTeleportTauntTimer = 0;

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function initGame() {
  score=0; graze=0; power=1.0;
  lives = babyMode ? 5 : 3; bombs=3; frame=0; stage=1;
  invincible=0; bombActive=0; stageTimer=0; scrollY=0;
  bgScrollY=0; bgPaused=false; defeatScreen=false; bossTeleporting=false;
  timeFreeze=false; timeFreezeTimer=0; timeFreezeAlpha=0;
  bossActive=false;
  wavePhase=0; waveDelay=90; spawnQueue=[];
  player = { x:W/2, y:H-80, w:32, h:40, speed:4, shootCooldown:0 };
  bullets=[]; enemies=[]; enemyBullets=[]; particles=[]; items=[]; boss=null; laserCharges=[];
  updateUI();
  showStageBanner('STAGE 1');
  musicOnStageStart(1);
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const dist = (x1,y1,x2,y2) => Math.sqrt((x1-x2)**2+(y1-y2)**2);

function showStageBanner(text) {
  const el = document.getElementById('stage-banner');
  el.textContent = text; el.style.opacity = 1;
  setTimeout(()=>{ el.style.opacity=0; }, 2200);
}

// Draw a sprite (or a coloured fallback rectangle)
function drawSprite(key, x, y, w, h, alpha=1, angle=0) {
  const img = SPRITES[key];
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x + w/2, y + h/2);
  if (angle) ctx.rotate(angle);
  if (img) {
    ctx.drawImage(img, -w/2, -h/2, w, h);
  } else {
    // coloured fallback so the game still works without image files
    const fallbackColors = {
      player:'#ff4488', enemy_a:'#44ccff', enemy_b:'#ffaa44',
      enemy_c:'#44ffcc', boss_reimu:'#ff2266', boss_marisa:'#ffcc00',
      boss_sakuya:'#aabbff', boss_yukari:'#cc66ff', boss_cirno:'#88ddff',
    };
    ctx.fillStyle = fallbackColors[key] || '#ffffff';
    ctx.fillRect(-w/2, -h/2, w, h);
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  SHOOTING  – 4 distinct power tiers
//  Tier 1 (power <1.5): single centre stream
//  Tier 2 (power 1.5–2.4): double stream
//  Tier 3 (power 2.5–3.4): double stream + side orbs shoot straight up
//  Tier 4 (power >=3.5): double stream + side orbs shoot HOMING bullets
// ═══════════════════════════════════════════════════════════════

// Side orb state – positions animate outward at higher power
const orbs = [
  { side: -1, angle: 0, shootTimer: 0 },  // left orb
  { side:  1, angle: 0, shootTimer: 0 },  // right orb
];

function getOrbPos(orb) {
  const dist = power >= 2.5 ? 28 : 0;
  return {
    x: player.x + orb.side * dist,
    y: player.y - 4
  };
}

function playerShoot() {
  // ── Tier 1: single stream ──
  if (power < 1.5) {
    bullets.push({ x:player.x, y:player.y-14, dx:0, dy:-8, dmg:12, type:'laser' });
  }
  // ── Tier 2: double stream ──
  else if (power < 2.5) {
    bullets.push({ x:player.x-5, y:player.y-14, dx:-0.3, dy:-7, dmg:10, type:'laser' });
    bullets.push({ x:player.x+5, y:player.y-14, dx: 0.3, dy:-7, dmg:10, type:'laser' });
  }
  // ── Tier 3+: double stream (orbs handle their own firing below) ──
  else {
    bullets.push({ x:player.x-5, y:player.y-14, dx:-0.3, dy:-7, dmg:10, type:'laser' });
    bullets.push({ x:player.x+5, y:player.y-14, dx: 0.3, dy:-7, dmg:10, type:'laser' });
  }
}

function updateOrbs() {
  if (power < 2.5) return;
  // Stage 2+ boss: disable homing orbs when boss is below 50% HP
  const bossNerfActive = bossActive && stage >= 2 && boss && boss.hp < bossMaxHp * 0.5;
  if (bossNerfActive && power >= 3.5) return;  // orbs suppressed
  orbs.forEach(orb => {
    orb.shootTimer++;
    const interval = power >= 3.5 ? 18 : 25;
    if (orb.shootTimer < interval) return;
    orb.shootTimer = 0;
    const pos = getOrbPos(orb);

    if (power >= 3.5) {
      // Homing bullet: finds nearest enemy/boss and curves toward it
      bullets.push({
        x: pos.x, y: pos.y,
        dx: orb.side * 1.5, dy: -4,
        dmg: 14, type: 'homing',
        homing: true
      });
    } else {
      // Tier 3: straight-up orb shot
      bullets.push({ x:pos.x, y:pos.y, dx:0, dy:-6, dmg:12, type:'orb' });
    }
  });
}

function updateHomingBullets() {
  for (let _i = bullets.length - 1; _i >= 0; _i--) {
    const b = bullets[_i];
    if (!b || !b.homing) continue;
    // find nearest target
    let target = null, best = 999999;
    if (bossActive && boss) {
      const d = Math.hypot(boss.x+boss.w/2-b.x, boss.y+boss.h/2-b.y);
      if (d < best) { best = d; target = { x:boss.x+boss.w/2, y:boss.y+boss.h/2 }; }
    }
    enemies.forEach(e => {
      const d = Math.hypot(e.x+e.w/2-b.x, e.y+e.h/2-b.y);
      if (d < best) { best = d; target = { x:e.x+e.w/2, y:e.y+e.h/2 }; }
    });
    if (target) {
      const a = Math.atan2(target.y - b.y, target.x - b.x);
      const spd = Math.hypot(b.dx, b.dy);
      b.dx += Math.cos(a) * 0.8;
      b.dy += Math.sin(a) * 0.8;
      // cap speed
      const ns = Math.hypot(b.dx, b.dy);
      if (ns > 6) { b.dx = b.dx/ns*9; b.dy = b.dy/ns*9; }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  BULLET PATTERNS
// ═══════════════════════════════════════════════════════════════
const patterns = {
  spread(e) {
    const n = easyMode ? 4 : 5+stage;
    const spd = easyMode ? 1.4 : 2.5;
    for (let i=0;i<n;i++) {
      const a = (Math.PI/(n-1))*i + Math.PI*0.1;
      eb(e, Math.cos(a)*spd, Math.sin(a)*spd, '#ff2266', 4);
    }
  },
  aimed(e) {
    const a = Math.atan2(player.y-e.y, player.x-e.x);
    const sp = easyMode ? 1.2 : 3+stage*0.3;
    const shots = easyMode ? 1 : 3;
    const spread = easyMode ? 0 : 0.2;
    for (let i=0;i<shots;i++) eb(e, Math.cos(a+(i-(shots-1)/2)*spread)*sp, Math.sin(a+(i-(shots-1)/2)*spread)*sp, '#ffaa00', 4);
  },
  ring(e, n=12) {
    const count = easyMode ? 4 : n;
    const spd = easyMode ? 1.3 : 2.2;
    for (let i=0;i<count;i++) {
      const a = (Math.PI*2/count)*i+(e.ringOffset||0);
      eb(e, Math.cos(a)*spd, Math.sin(a)*spd, '#44ffcc', 5);
    }
  },
  spiral(e) {
    const a = e.spiralAngle||0;
    const arms = easyMode ? 1 : 3;
    const spd  = easyMode ? 1.4 : 2.5;
    for (let i=0;i<arms;i++) {
      const aa = a+(Math.PI*2/arms)*i;
      eb(e, Math.cos(aa)*spd, Math.sin(aa)*spd, '#cc44ff', 4);
    }
    e.spiralAngle = a + (easyMode ? 0.12 : 0.2);
  },
  laser(e) {
    if (easyMode) return;   // no laser in easy mode
    const a = Math.atan2(player.y-e.y, player.x-e.x);
    for (let i=0;i<15;i++) {
      setTimeout(()=>{ eb(e, Math.cos(a)*(4+i*0.2), Math.sin(a)*(4+i*0.2), '#ff44ff', 3); }, i*40);
    }
  },
  // Baby mode patterns
  baby_aimed(e) {
    const a = Math.atan2(player.y-e.y, player.x-e.x);
    eb(e, Math.cos(a)*2.2, Math.sin(a)*2.2, '#ffaa00', 4);
  },
  baby_cross(e) {
    // 4 bullets: up, down, left, right
    [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
      eb(e, dx*2.2, dy*2.2, '#ff88cc', 4);
    });
  },
  baby_silent(e) { /* enemy_c in baby mode: no bullets */ }
};
// shorthand – push enemy bullet
function eb(e, dx, dy, color, r) {
  // Baby mode: bullets home for 60 frames then go straight
  const homeFrames = babyMode ? 60 : 0;
  enemyBullets.push({ x:e.x, y:e.y, dx, dy, r, color, homeFrames });
}

// ═══════════════════════════════════════════════════════════════
//  ENEMY WAVE SPAWNER – frame-based queue, no setTimeout
// ═══════════════════════════════════════════════════════════════
let spawnQueue = [];
function queueSpawn(delayFrames, fn) {
  spawnQueue.push({ atFrame: frame + delayFrames, fn });
}
function processSpawnQueue() {
  for (let i = spawnQueue.length - 1; i >= 0; i--) {
    if (frame >= spawnQueue[i].atFrame) {
      spawnQueue[i].fn();
      spawnQueue.splice(i, 1);
    }
  }
}

// 10 distinct waves before boss
function spawnWave(waveIndex) {
  const w = waveIndex % 10;
  switch(w) {
    case 0: // small line from top
      for (let i=0;i<6;i++) { const ii=i;
        queueSpawn(i*20, ()=>spawnEnemy('enemy_a',50+ii*50,-30, 0,1.2,'aimed',30,100)); }
      break;
    case 1: // two columns converging inward
      for (let i=0;i<5;i++) { const ii=i;
        queueSpawn(i*18, ()=>{ spawnEnemy('enemy_a',20,-40-ii*30, 0.8,1.0,'aimed',30,100);
                               spawnEnemy('enemy_a',W-20,-40-ii*30,-0.8,1.0,'aimed',30,100); }); }
      break;
    case 2: // spread shooters across top
      for (let i=0;i<5;i++) { const ii=i;
        queueSpawn(i*25, ()=>spawnEnemy('enemy_b',W*(ii+1)/6,-30,0,0.8,'spread',40,150)); }
      break;
    case 3: // V-formation
      for (let i=0;i<7;i++) { const ii=i;
        queueSpawn(i*15, ()=>spawnEnemy('enemy_a', W/2+(ii%2===0?1:-1)*(ii/2)*45, -30-ii*10, 0, 1.3,'aimed',30,100)); }
      break;
    case 4: // two waves of ring shooters
      for (let i=0;i<4;i++) { const ii=i;
        queueSpawn(i*30, ()=>spawnEnemy('enemy_b',60+ii*85,-30, 0,1.0,'ring',50,150,{ringOffset:ii*0.4})); }
      queueSpawn(80, ()=>{
        for(let i=0;i<3;i++){const ii=i; queueSpawn(i*25,()=>spawnEnemy('enemy_b',80+ii*100,-30,0,1.1,'ring',50,150,{ringOffset:ii*0.8}));}
      });
      break;
    case 5: // spiral shooters flanking
      for (let i=0;i<3;i++) { const ii=i;
        queueSpawn(i*35, ()=>{ spawnEnemy('enemy_c',40+ii*40,-30, 0.4+ii*0.1,1.2,'spiral',60,200);
                               spawnEnemy('enemy_c',W-40-ii*40,-30,-0.4-ii*0.1,1.2,'spiral',60,200); }); }
      break;
    case 6: // dense aimed swarm
      for (let i=0;i<10;i++) { const ii=i;
        queueSpawn(i*14, ()=>spawnEnemy('enemy_a', 30+ii*33, -30, Math.sin(ii)*0.5, 1.4,'aimed',25,80)); }
      break;
    case 7: // ring + spread mix
      for (let i=0;i<3;i++) { const ii=i;
        queueSpawn(i*40, ()=>{ spawnEnemy('enemy_c',W/4,-30, 0.3,1.0,'ring',70,220,{ringOffset:ii*0.6});
                               spawnEnemy('enemy_b',W*3/4,-30,-0.3,1.0,'spread',50,180); }); }
      break;
    case 8: // big armoured wave
      for (let i=0;i<6;i++) { const ii=i;
        queueSpawn(i*22, ()=>spawnEnemy('enemy_c', W*(ii+1)/7, -30, Math.cos(ii)*0.6, 0.9,'ring',80,250,{ringOffset:ii*0.3})); }
      break;
    case 9: // final pre-boss mixed rush
      for (let i=0;i<4;i++) { const ii=i;
        queueSpawn(i*15, ()=>{ spawnEnemy('enemy_b',50+ii*60,-30, 0.2,1.3,'spread',45,160);
                               spawnEnemy('enemy_b',W-50-ii*60,-30,-0.2,1.3,'spread',45,160); }); }
      queueSpawn(70, ()=>{
        for(let i=0;i<5;i++){const ii=i; queueSpawn(i*18,()=>spawnEnemy('enemy_c',W*(ii+1)/6,-30,0,1.1,'spiral',65,200));}
      });
      break;
  }
}

function spawnEnemy(sprKey, x, y, vx, vy, pattern, hp, sc, extra={}) {
  if (sprKey === 'enemy_c') hp = 1;  // one-hit kill
  // Baby mode: override patterns and behaviour
  if (babyMode) {
    if (sprKey === 'enemy_a') pattern = 'baby_aimed';
    if (sprKey === 'enemy_b') pattern = 'baby_cross';
    if (sprKey === 'enemy_c') { pattern = 'baby_silent'; extra = {...extra, gravitates:true}; }
  }
  const sizes = { enemy_a:{w:24,h:24}, enemy_b:{w:28,h:28}, enemy_c:{w:32,h:32} };
  const s = sizes[sprKey]||{w:24,h:24};
  const initTimer = babyMode ? 60 + Math.floor(Math.random()*60) : easyMode ? 120 + Math.floor(Math.random()*180) : 80;
  enemies.push({ sprKey, x, y, vx, vy, pattern, hp, maxHp:hp, score:sc,
                 w:s.w, h:s.h, shootTimer:initTimer, firstShot:true, ...extra });
}

function spawnBoss() {
  bossActive = true;
  const def = BOSS_ROSTER[(stage-1) % BOSS_ROSTER.length];
  const baseHp = extraMode ? 6000 : (easyMode||babyMode) ? 1200 : 3000;
  bossMaxHp = (baseHp + ((easyMode||babyMode) ? stage*400 : stage*1200)) * 2; bossHp = bossMaxHp;
  boss = { ...def, x:W/2-def.w/2, y:30, hp:bossHp,
           targetX:W/2, targetY:60, shootTimer:0,
           moveTimer:0, spiralAngle:0, ringOffset:0,
           fightPhase:0, fightTimer:0 };
  document.getElementById('boss-section').style.display='block';
  updateBossHp();
  showStageBanner('BOSS: '+def.name);
  bgPaused = true;
  musicOnBossSpawn(stage);
  bossQuip = def.quip || '';
  bossQuipSpeaker = def.name.includes('  ') ? def.name.split('  ')[1] : def.name;
  bossQuipTimer = 300;
}

function updateBossHp() {
  const pct = Math.max(0, boss.hp/bossMaxHp*100);
  document.getElementById('boss-hp-fill').style.width = pct+'%';
  document.getElementById('boss-hp-bar').style.display='block';
}

// ── Laser charge helper (stages 6-7) ──────────────────────
// A laser charge appears as a thin vertical line that grows bold over 3 seconds then fires
function spawnLaserCharge(x) {
  laserCharges.push({ x, life:180, maxLife:180, fired:false });
}

function updateLaserCharges() {
  for (let i=laserCharges.length-1;i>=0;i--) {
    const lc=laserCharges[i];
    lc.life--;
    if (lc.life <= 0 && !lc.fired) {
      lc.fired=true;
      // fire a dense column of bullets down the x position
      for (let y=0;y<H;y+=22) {
        enemyBullets.push({ x:lc.x, y, dx:0, dy:2.5, r:6, color:'#ff2222' });
      }
      laserCharges.splice(i,1);
    }
  }
}

function drawLaserCharges() {
  laserCharges.forEach(lc=>{
    const t = 1 - lc.life/lc.maxLife;  // 0→1 as it charges
    const w = 1 + t*6;                  // thin line grows to thick
    const alpha = 0.3 + t*0.7;
    ctx.save();
    ctx.strokeStyle=`rgba(255,50,50,${alpha})`;
    ctx.lineWidth=w;
    ctx.shadowColor='#ff2222'; ctx.shadowBlur=8*t;
    ctx.beginPath(); ctx.moveTo(lc.x,0); ctx.lineTo(lc.x,H); ctx.stroke();
    // warning glow at top
    ctx.fillStyle=`rgba(255,100,50,${alpha*0.6})`;
    ctx.beginPath(); ctx.arc(lc.x,10,4+t*6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function bossBehavior() {
  if (!boss) return;
  boss.moveTimer++;
  boss.fightTimer = (boss.fightTimer||0) + 1;

  // Teleport dodge on hit (stages 6+ hard/extra only)
  if (bossTeleporting) {
    bossTeleportTimer--;
    if (bossTeleportTimer <= 0) { bossTeleporting = false; }
    return;
  }

  const ti = babyMode ? 4 : easyMode ? 3 : 1;
  const be = { x:boss.x+boss.w/2, y:boss.y+boss.h/2, spiralAngle:boss.spiralAngle, ringOffset:boss.ringOffset };
  boss.shootTimer++;

  // ── Standard movement ──────────────────────────────────────
  function driftMove(speed=0.02, interval=120) {
    if (boss.moveTimer % interval === 0) {
      boss.targetX = 60+Math.random()*(W-120)-boss.w/2;
      boss.targetY = 30+Math.random()*100;
    }
    boss.x += (boss.targetX-boss.x)*speed;
    boss.y += (boss.targetY-boss.y)*speed;
  }

  // ── Left-side homing rush then center ─────────────────────
  function homingRushPattern() {
    if (!boss.fpPhase) boss.fpPhase=0;
    boss.fpTimer = (boss.fpTimer||0)+1;
    if (boss.fpPhase===0) {
      boss.x += (20-boss.x)*0.05; boss.y += (80-boss.y)*0.05;
      if (Math.abs(boss.x-20)<5) { boss.fpPhase=1; boss.fpTimer=0; }
    } else if (boss.fpPhase===1) {
      boss.x += (20-boss.x)*0.02; boss.y += (80-boss.y)*0.02;
      if (boss.fpTimer%8===0 && boss.fpTimer<220) {
        const a=Math.atan2(player.y-be.y,player.x-be.x);
        enemyBullets.push({x:be.x,y:be.y,dx:Math.cos(a)*3.5,dy:Math.sin(a)*3.5,r:5,color:'#ff44ff',homing:true,homingLife:50});
      }
      if (boss.fpTimer>=240){boss.fpPhase=2;boss.fpTimer=0;}
    } else if (boss.fpPhase===2) {
      boss.x += (W/2-boss.w/2-boss.x)*0.04; boss.y += (60-boss.y)*0.04;
      if (Math.abs(boss.x-(W/2-boss.w/2))<6){boss.fpPhase=0;boss.fpTimer=0;}
    }
  }

  // ─────────────────────────────────────────────────────────────
  //  PER-STAGE BEHAVIOR
  // ─────────────────────────────────────────────────────────────

  if (stage === 1) {
    // Reimu: simple drift, spread + aimed
    driftMove(0.018);
    if (boss.shootTimer%(35*ti)===0) patterns.aimed(be);
    if (boss.shootTimer%(90*ti)===0) patterns.spread(be);
    if (boss.shootTimer%(150*ti)===0) patterns.ring(be, easyMode?4:8);

  } else if (stage === 2) {
    // Marisa: drift + diagonal spread bursts
    driftMove(0.02);
    if (boss.shootTimer%(28*ti)===0) patterns.spread(be);
    if (boss.shootTimer%(60*ti)===0) patterns.aimed(be);
    if (boss.shootTimer%(110*ti)===0) {
      // double spread burst offset
      const be2a={...be, ringOffset:0};
      const be2b={...be, ringOffset:Math.PI/8};
      patterns.ring(be2a, easyMode?4:10);
      patterns.ring(be2b, easyMode?4:10);
    }

  } else if (stage === 3) {
    // Cirno: ice fairy – erratic movement, ring bursts, icicle volleys
    // Erratic zigzag movement
    if (boss.moveTimer % 60 === 0) {
      boss.targetX = 30 + Math.random()*(W-80) - boss.w/2;
      boss.targetY = 20 + Math.random()*120;
    }
    boss.x += (boss.targetX-boss.x)*0.06;
    boss.y += (boss.targetY-boss.y)*0.06;
    // Ice ring bursts
    if (boss.shootTimer%(45*ti)===0) patterns.ring(be, easyMode?4:10);
    // Aimed icicle
    if (boss.shootTimer%(30*ti)===0) patterns.aimed(be);
    // Double ring offset
    if (boss.shootTimer%(120*ti)===0) {
      const be2={...be, ringOffset:Math.PI/10};
      patterns.ring(be, easyMode?4:8);
      patterns.ring(be2, easyMode?4:8);
    }
    // Cirno boast: "I'm the strongest!" tint the screen icy briefly
    if (boss.shootTimer%(300*ti)===0 && !timeFreeze) {
      timeFreeze=true; timeFreezeTimer=90; // shorter freeze
    }

  } else if (stage === 4) {
    // Yukari: gaps + ring barrages from sides
    driftMove(0.018,100);
    if (boss.shootTimer%(22*ti)===0) { patterns.spiral(be); boss.spiralAngle=be.spiralAngle; }
    if (boss.shootTimer%(80*ti)===0) patterns.ring(be, easyMode?4:14);
    if (boss.shootTimer%(40*ti)===0) patterns.aimed(be);
    // Phase: occasionally do homing rush
    if (boss.shootTimer%(350*ti)===0) { boss.fpPhase=0; boss.fpTimer=0; }
    if (boss.fpPhase!==undefined && boss.fpTimer>0) homingRushPattern();

  } else if (stage === 5) {
    // Reimu II: spiral walls + homing rush loop
    homingRushPattern();
    if (boss.shootTimer%(18*ti)===0) { patterns.spiral(be); boss.spiralAngle=be.spiralAngle; }
    if (boss.shootTimer%(55*ti)===0) patterns.aimed(be);
    if (boss.shootTimer%(120*ti)===0) patterns.ring(be, easyMode?4:16);

  } else if (stage === 6) {
    // Sakuya: TIME FREEZE + homing rush + laser charges
    homingRushPattern();
    if (boss.shootTimer%(22*ti)===0) { patterns.spiral(be); boss.spiralAngle=be.spiralAngle; }
    if (boss.shootTimer%(40*ti)===0) patterns.aimed(be);
    if (boss.shootTimer%(90*ti)===0) patterns.spread(be);
    // TIME FREEZE trigger
    if (boss.shootTimer%(350*ti)===0 && !timeFreeze) {
      timeFreeze=true; timeFreezeTimer=210; // 3.5 seconds at stage 6
    }
    // Laser charges
    if (boss.shootTimer%(170*ti)===0) {
      spawnLaserCharge(W*0.25);
      queueSpawn(30, ()=>spawnLaserCharge(W*0.75));
    }
    if (boss.shootTimer%(260*ti)===0) {
      spawnLaserCharge(W*0.1);
      queueSpawn(25, ()=>spawnLaserCharge(W*0.5));
      queueSpawn(50, ()=>spawnLaserCharge(W*0.9));
    }

  } else if (stage === 7) {
    // Yukari Final: everything + dense lasers (replaces old stage 7 slot)
    homingRushPattern();
    if (boss.shootTimer%(15*ti)===0) { patterns.spiral(be); boss.spiralAngle=be.spiralAngle; }
    if (boss.shootTimer%(30*ti)===0) patterns.aimed(be);
    if (boss.shootTimer%(90*ti)===0) patterns.ring(be, easyMode?4:20);
    // More frequent and triple laser charges
    if (boss.shootTimer%(120*ti)===0) {
      const positions=[W*0.15,W*0.5,W*0.85];
      positions.forEach((px,i)=>queueSpawn(i*20,()=>spawnLaserCharge(px)));
    }
    if (boss.shootTimer%(200*ti)===0) {
      [W*0.08,W*0.3,W*0.6,W*0.92].forEach((px,i)=>queueSpawn(i*15,()=>spawnLaserCharge(px)));
    }
  }

  bossHp = boss.hp;
  updateBossHp();

  if (boss.hp<=0 && !defeatScreen) {
    for (let i=0;i<60;i++) spawnParticle(boss.x+boss.w/2, boss.y+boss.h/2,'#ffdd44',8);
    score += 10000*stage;
    // Drop life orb (not in extra mode)
    if (!extraMode) {
      const dropChance = babyMode ? 1.0 : easyMode ? 0.85 : 0.5;
      if (Math.random() < dropChance) {
        items.push({ x:boss.x+(boss.w||48)/2, y:boss.y+(boss.h||56)/2, vy:0.8, type:'life' });
      }
    }
    // Show defeat screen
    const def2 = BOSS_ROSTER[(stage-1) % BOSS_ROSTER.length];
    defeatQuipText = def2.defeatQuip || '...';
    defeatBossKey  = def2.key;
    defeatBossW    = def2.w; defeatBossH = def2.h;
    defeatScreen   = true; defeatPhase = 0; defeatScale = 1; defeatAlpha = 0;
    bossActive=false; boss=null;
    document.getElementById('boss-section').style.display='none';
    enemyBullets=[];
    // stage advance happens after defeat screen Z-press via advanceAfterBoss()
  }
}

function advanceAfterBoss() {
  const maxStage = (hardMode || extraMode) ? 7 : 6;
  bgPaused = false;
  if (stage >= maxStage) {
    musicOnVictory();
    state='victory';
    document.getElementById('victory-score').textContent='SCORE: '+score.toLocaleString();
    document.getElementById('victory-screen').style.display='flex';
    if (score>hiScore) hiScore=score;
    if (!extraMode) {
      document.getElementById('extra-unlock-msg').style.display='block';
      document.getElementById('extra-mode-btn').style.display='inline-block';
    }
  } else {
    stage++; stageTimer=0;
    wavePhase=0; waveDelay=120; spawnQueue=[];
    enemies=[]; enemyBullets=[];
    bgScrollY=0; bgPaused = false;
    showStageBanner('STAGE '+stage);
    musicOnBossDefeated(stage);  // stage already incremented
    updateUI();
  }
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function updateEnemies() {
  for (let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i];
    // Baby mode: enemy_c gravitates toward player
    if (babyMode && e.gravitates) {
      const dx = player.x - (e.x+e.w/2), dy = player.y - (e.y+e.h/2);
      const d  = Math.sqrt(dx*dx+dy*dy) || 1;
      e.vx += dx/d * 0.04;
      e.vy += dy/d * 0.04;
      // cap speed
      const spd = Math.sqrt(e.vx*e.vx+e.vy*e.vy);
      if (spd > 1.8) { e.vx = e.vx/spd*1.8; e.vy = e.vy/spd*1.8; }
    }
    e.x+=e.vx; e.y+=e.vy; e.shootTimer--;
    // Baby mode: fire twice the moment enemy enters screen (not wave 0)
    if (babyMode && e.firstShot && e.y >= 0 && wavePhase > 1) {
      e.firstShot = false;
      const proxy = { x:e.x+e.w/2, y:e.y+e.h/2, spiralAngle:e.spiralAngle, ringOffset:e.ringOffset };
      if (patterns[e.pattern]) {
        patterns[e.pattern](proxy);
        if (e.pattern==='spiral') e.spiralAngle=proxy.spiralAngle;
        // second shot slightly delayed via queue
        queueSpawn(12, () => {
          if (!enemies.includes(e)) return;
          const p2 = { x:e.x+e.w/2, y:e.y+e.h/2, spiralAngle:e.spiralAngle, ringOffset:e.ringOffset };
          patterns[e.pattern](p2);
          if (e.pattern==='spiral') e.spiralAngle=p2.spiralAngle;
        });
      }
      e.shootTimer = 80; // reset so next shot comes at normal interval
    } else if (e.firstShot && e.y >= 0) {
      e.firstShot = false; // clear flag in other modes too
    }
    if (e.shootTimer<=0) {
      const proxy = { x:e.x+e.w/2, y:e.y+e.h/2, spiralAngle:e.spiralAngle, ringOffset:e.ringOffset };
      const nonCircle = e.pattern==='aimed' || e.pattern==='spread';
      const tooClose  = easyMode && nonCircle && dist(player.x, player.y, proxy.x, proxy.y) < 90;
      // Baby mode: wave 0 (wavePhase 0-1) enemies never fire
      const babyWave0 = babyMode && wavePhase <= 1;
      if (!tooClose && !babyWave0) {
        if (patterns[e.pattern]) {
          patterns[e.pattern](proxy);
          if (e.pattern==='spiral') e.spiralAngle=proxy.spiralAngle;
        }
      }
      e.shootTimer = babyMode ? 80 : easyMode ? 180 : Math.max(30,80-stage*5);
    }
    // bullet hits
    let killed = false;
    for (let bi=bullets.length-1;bi>=0;bi--) {
      const b=bullets[bi];
      if (dist(b.x,b.y, e.x+e.w/2, e.y+e.h/2) < e.w/2+4) {
        e.hp-=b.dmg;
        bullets.splice(bi,1);
        spawnParticle(b.x,b.y,'#ffcc44',2);
        if (e.hp<=0) {
          score+=e.score*stage;
          for(let p=0;p<10;p++) spawnParticle(e.x+e.w/2,e.y+e.h/2,'#44ffcc',4);
          if (extraMode) {
            const r = Math.random();
            if (r < 0.3)       items.push({x:e.x+e.w/2,y:e.y+e.h/2,vy:1,type:'power'});
            else if (r < 0.8)  items.push({x:e.x+e.w/2,y:e.y+e.h/2,vy:1,type:'point'});
          } else {
            if (Math.random()<0.8) items.push({x:e.x+e.w/2,y:e.y+e.h/2,vy:2,type:'power'});
          }
          enemies.splice(i,1); killed=true; break;
        }
      }
    }
    // remove off-screen only if not already removed by kill
    if (!killed && (e.y>H+60||e.x<-80||e.x>W+80)) enemies.splice(i,1);
  }
}

function updateBullets() {
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    // Time freeze: stop non-orb player bullets (orb homing unaffected)
    if (timeFreeze && b.type !== 'homing' && b.type !== 'orb') continue;
    b.x+=b.dx; b.y+=b.dy;
    if (b.y<-20||b.x<-20||b.x>W+20) { bullets.splice(i,1); continue; }
    if (bossActive&&boss && dist(b.x,b.y, boss.x+boss.w/2, boss.y+boss.h/2)<boss.w/2) {
      boss.hp-=b.dmg; bullets.splice(i,1); spawnParticle(b.x,b.y,'#ffcc44',2);
      // Teleport dodge for stage 6+ in hard/extra mode
      if (stage >= 6 && (hardMode||extraMode) && !bossTeleporting && Math.random() < 0.18) {
        bossTeleporting = true;
        bossTeleportTimer = 40;
        boss.x = 30 + Math.random() * (W - 90);
        boss.y = 20 + Math.random() * 100;
        boss.targetX = boss.x; boss.targetY = boss.y;
        const def3 = BOSS_ROSTER[(stage-1) % BOSS_ROSTER.length];
        if (def3.teleportTaunt) {
          bossTeleportTaunt = def3.teleportTaunt;
          bossTeleportTauntTimer = 180;
        }
      }
    }
  }
}

function updateEnemyBullets() {
  for (let i=enemyBullets.length-1;i>=0;i--) {
    const b=enemyBullets[i];
    // Boss fight-phase homing bullets
    if (b.homing && b.homingLife && b.homingLife > 0) {
      b.homingLife--;
      const ha2 = Math.atan2(player.y-b.y, player.x-b.x);
      const bs2 = Math.sqrt(b.dx*b.dx+b.dy*b.dy)||1;
      b.dx += Math.cos(ha2)*0.15; b.dy += Math.sin(ha2)*0.15;
      const ns2 = Math.sqrt(b.dx*b.dx+b.dy*b.dy);
      if (ns2 > bs2+1) { b.dx=b.dx/ns2*(bs2+1); b.dy=b.dy/ns2*(bs2+1); }
    }
    // Any bullet with zero speed homes toward player permanently
    const bspd = Math.sqrt(b.dx*b.dx+b.dy*b.dy);
    if (bspd === 0) {
      const ha = Math.atan2(player.y-b.y, player.x-b.x);
      b.dx += Math.cos(ha) * 0.06;
      b.dy += Math.sin(ha) * 0.06;
      const ns = Math.sqrt(b.dx*b.dx+b.dy*b.dy);
      if (ns > 2.0) { b.dx=b.dx/ns*2.0; b.dy=b.dy/ns*2.0; }
    }
    // Baby mode homing: home if moving downward (dy>0)
    else if (b.homeFrames && b.homeFrames > 0 && b.dy > 0) {
      b.homeFrames--;
      const ha = Math.atan2(player.y-b.y, player.x-b.x);
      const spd2 = bspd || 1.2;
      b.dx += Math.cos(ha) * 0.08;
      b.dy += Math.sin(ha) * 0.08;
      const ns = Math.sqrt(b.dx*b.dx+b.dy*b.dy);
      if (ns > spd2) { b.dx=b.dx/ns*spd2; b.dy=b.dy/ns*spd2; }
    } else if (b.homeFrames && b.homeFrames > 0) {
      b.homeFrames--;
    }
    b.x+=b.dx; b.y+=b.dy;
    if (b.y>H+20||b.y<-20||b.x<-20||b.x>W+20) { enemyBullets.splice(i,1); continue; }
    const d = dist(b.x,b.y, player.x,player.y);
    if (!b.grazed&&d<14) { b.grazed=true; graze++; score+=10; }
    if (invincible<=0&&bombActive<=0&&d<5) { playerHit(); enemyBullets.splice(i,1); }
  }
}

function playerHit() {
  lives--;
  invincible=180; enemyBullets=[];
  power=Math.max(1,power-0.5);
  for(let i=0;i<20;i++) spawnParticle(player.x,player.y,'#ff4488',5);
  if (lives<0) {
    state='gameover';
    document.getElementById('final-score').textContent='SCORE: '+score.toLocaleString();
    document.getElementById('gameover-screen').style.display='flex';
    if (score>hiScore) hiScore=score;
  }
  updateUI();
}

function updateItems() {
  for (let i=items.length-1;i>=0;i--) {
    const it=items[i];
    it.y+=it.vy;
    if (it.y>H+10) { items.splice(i,1); continue; }
    if (dist(it.x,it.y,player.x,player.y)<18) {
      if (it.type==='power') { power=Math.min(4,power+0.2); score+=50; }
      else if (it.type==='life') {
        const cap = babyMode ? 7 : Infinity;
        if (lives < cap) { lives++; updateUI(); }
        score+=1000;
      }
      else { score+=500*stage; }
      const pcolor = it.type==='life'?'#ffdd44':it.type==='power'?'#ff44cc':'#44ffcc';
      for(let p=0;p<8;p++) spawnParticle(it.x,it.y,pcolor,4);
      items.splice(i,1);
    }
  }
}

function spawnParticle(x,y,color,speed) {
  for (let i=0;i<3;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*speed+1;
    particles.push({x,y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,life:20+Math.random()*20,maxLife:40,color,r:2+Math.random()*2});
  }
}

function updateParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.dx; p.y+=p.dy; p.dx*=0.95; p.dy*=0.95; p.life--;
    if (p.life<=0) particles.splice(i,1);
  }
}


// ── Pre-boss bullet string (baby mode) ────────────────────────
// A decorative curtain of slow bullets that sweeps across the screen
// giving the player a visible warning that the boss is coming.
function spawnBulletString() {
  const rows = 3;
  const cols = 12;
  const colors = ['#ff44aa','#ffaa00','#44ffcc'];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const delay = c * 8 + r * 3;
      const rr = r, cc = c;
      queueSpawn(delay, () => {
        const x = (cc / (cols-1)) * (W - 20) + 10;
        const y = -10 - rr * 18;
        enemyBullets.push({
          x, y,
          dx: 0,
          dy: 1.0 + rr * 0.2,
          r: 5, color: colors[rr % colors.length],
          isBulletString: true   // won't home, won't graze-score
        });
      });
    }
  }
}
// ── Wave state machine ─────────────────────────────────────────
// 10 waves (phases 0-19), then pre-boss pause (20), then boss (21+)
// Even phase = countdown to spawn; odd phase = wait for clear
let wavePhase = 0;
let waveDelay = 90;   // frames before wave 0

function updateStage() {
  if (bossActive) return;
  processSpawnQueue();
  const allClear = spawnQueue.length === 0 && enemies.length === 0;

  if (wavePhase < 20) {
    if (wavePhase % 2 === 0) {
      // even = countdown then spawn wave N
      if (--waveDelay <= 0) {
        spawnWave(wavePhase / 2);
        wavePhase++;
      }
    } else {
      // odd = wait for screen clear
      if (allClear) { waveDelay = 90; wavePhase++; }
    }
  } else if (wavePhase === 20) {
    // pre-boss: spawn bullet string in baby mode, then pause, then boss
    if (waveDelay === 90) {
      // first frame of this phase – fire the warning string if baby mode
      if (babyMode) spawnBulletString();
      waveDelay--;
    } else {
      if (--waveDelay <= 0) { spawnBoss(); wavePhase = 21; }
    }
  }
  // wavePhase 21+ = boss fight, bossBehavior() takes over
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
function handleInput() {
  const focused = keys['ShiftLeft']||keys['ShiftRight'];
  const sp = focused ? 1.2 : 2.5+power*0.15;
  if (keys['ArrowLeft'])  player.x=Math.max(player.w/2, player.x-sp);
  if (keys['ArrowRight']) player.x=Math.min(W-player.w/2, player.x+sp);
  if (keys['ArrowUp'])    player.y=Math.max(player.h/2, player.y-sp);
  if (keys['ArrowDown'])  player.y=Math.min(H-player.h/2, player.y+sp);

  player.shootCooldown--;
  if (keys['KeyZ']&&player.shootCooldown<=0 && !timeFreeze) {
    playerShoot(); player.shootCooldown=Math.max(2,6-Math.floor(power));
  }
  if (keys['KeyX']&&bombs>0&&bombActive<=0) {
    bombs--; bombActive=180; enemyBullets=[];
    score+=1000;
    for(let i=0;i<40;i++) spawnParticle(player.x,player.y,'#44aaff',8);
    updateUI();
  }
  if (keys['Escape']) { paused=!paused; keys['Escape']=false; }
}

const stars = Array.from({length:80},()=>({
  x:Math.random()*384, y:Math.random()*448,
  speed:0.3+Math.random()*1.2, r:Math.random()*1.5, b:Math.random(), yf:Math.random()*448
}));

function drawBG() {
  const lvl = Math.min(stage, 7);
  const bgImg = SPRITES[`bg${lvl}`];

  if (bgImg && bgImg.complete && bgImg.naturalHeight > 0) {
    const imgH = bgImg.naturalHeight;
    const scrollable = imgH - H;   // 896px for a 1344px tall image

    // Fixed scroll rate: 0.18 px/frame ≈ 10.8 px/sec at 60fps
    // At that rate, 896px takes ~4978 frames (~83 sec) — covers all 10 waves
    const speed = 0.18;

    // Advance scroll only while playing (not boss, not defeat screen)
    if (!bgPaused && !defeatScreen && state === 'playing') {
      bgScrollY = Math.min(bgScrollY + speed, scrollable);
    }

    // Start at bottom of image, scroll toward top
    const offset = Math.max(0, scrollable - bgScrollY);
    ctx.drawImage(bgImg, 0, offset, W, H, 0, 0, W, H);
  } else {
    // fallback
    ctx.fillStyle='#060010'; ctx.fillRect(0,0,W,H);
    const starMult = extraMode ? 1.0 : 0.35;
    stars.forEach(s=>{
      s.y+=s.speed*starMult; if(s.y>H){s.y=0;s.x=Math.random()*W;}
      ctx.fillStyle=`rgba(200,170,255,${0.4+s.b*0.6})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
  }
}

function drawPlayer() {
  if (invincible>0&&Math.floor(invincible/4)%2===0) return;
  const px=player.x-player.w/2, py=player.y-player.h/2;

  // bomb aura ring
  if (bombActive>0) {
    const ba=bombActive/180;
    ctx.save(); ctx.strokeStyle=`rgba(100,180,255,${ba*0.8})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(player.x,player.y,(1-ba)*80+10,0,Math.PI*2); ctx.stroke(); ctx.restore();
  }

  // player sprite (drawn at pixel coords)
  drawSprite('player', px, py, player.w, player.h);

  // side orbs (tier 3+)
  if (power >= 2.5) {
    orbs.forEach(orb => {
      const pos = getOrbPos(orb);
      const isHoming = power >= 3.5;
      ctx.save();
      ctx.shadowColor = isHoming ? '#ff44ff' : '#44aaff';
      ctx.shadowBlur = 10;
      ctx.fillStyle = isHoming ? '#ff88ff' : '#88ccff';
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 6, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(pos.x - 2, pos.y - 2, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  // hitbox when focused
  if (keys['ShiftLeft']||keys['ShiftRight']) {
    ctx.save();
    ctx.strokeStyle='rgba(255,200,255,0.9)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(player.x,player.y,4,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,180,255,0.4)'; ctx.fill();
    ctx.restore();
  }
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.save();
    if (b.homing) {
      ctx.shadowColor = '#ff44ff'; ctx.shadowBlur = 8;
      ctx.fillStyle = '#ffaaff';
      ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(b.x, b.y, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (b.type === 'orb') {
      ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 6;
      ctx.fillStyle = '#aaddff';
      ctx.fillRect(b.x-2, b.y-5, 4, 10);
    } else {
      ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 4;
      ctx.fillStyle = '#ffeeaa';
      ctx.fillRect(b.x-1.5, b.y-4, 3, 8);
    }
    ctx.restore();
  });
}

function drawEnemyBullets() {
  enemyBullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor=b.color; ctx.shadowBlur=6;
    ctx.fillStyle='#ffffff'; ctx.globalAlpha=1;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=b.color; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawEnemies() {
  enemies.forEach(e=>{
    const sk = (e.sprKey==='enemy_a'||e.sprKey==='enemy_b'||e.sprKey==='enemy_c') ? palKey(e.sprKey) : e.sprKey;
    drawSprite(sk, e.x, e.y, e.w, e.h);
    // HP bar
    ctx.fillStyle='#330022'; ctx.fillRect(e.x, e.y+e.h+2, e.w, 3);
    ctx.fillStyle='#ff0044'; ctx.fillRect(e.x, e.y+e.h+2, e.w*(e.hp/e.maxHp), 3);
  });
}

function drawBoss() {
  if (!boss) return;
  const t=frame*0.05;
  // pulsing aura
  ctx.save();
  ctx.strokeStyle=`rgba(255,0,150,${0.25+Math.sin(t*3)*0.1})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(boss.x+boss.w/2,boss.y+boss.h/2, boss.w/2+14+Math.sin(t*2)*4,0,Math.PI*2); ctx.stroke();
  // rotating gem ring
  for(let i=0;i<6;i++){
    const a=t+(Math.PI*2/6)*i;
    const rx=boss.x+boss.w/2+Math.cos(a)*(boss.w/2+20);
    const ry=boss.y+boss.h/2+Math.sin(a)*(boss.w/2+20);
    ctx.fillStyle=`hsl(${(frame*2+i*60)%360},100%,70%)`;
    ctx.beginPath(); ctx.arc(rx,ry,4,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  drawSprite(boss.key, boss.x, boss.y, boss.w, boss.h);
}

function drawItems() {
  items.forEach(it=>{
    ctx.save();
    if (it.type==='life') {
      // Golden star with pulsing glow
      const pulse = 0.7 + Math.sin(frame * 0.15) * 0.3;
      ctx.shadowColor='#ffdd44'; ctx.shadowBlur=12*pulse;
      ctx.translate(it.x, it.y);
      // Draw a small heart/star shape
      ctx.fillStyle=`rgba(255,220,50,${pulse})`;
      // Star shape
      for (let s=0;s<5;s++) {
        const a = (s/5)*Math.PI*2 - Math.PI/2;
        const ia = a + Math.PI/5;
        if (s===0) ctx.beginPath();
        ctx.lineTo(Math.cos(a)*8, Math.sin(a)*8);
        ctx.lineTo(Math.cos(ia)*4, Math.sin(ia)*4);
      }
      ctx.closePath(); ctx.fill();
      // White dot center
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(0,0,2,0,Math.PI*2); ctx.fill();
      // 1UP label
      ctx.fillStyle='#ffee88';
      ctx.font='bold 8px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('1UP', 0, 18);
    } else if (it.type==='power') {
      ctx.fillStyle='#ff44cc'; ctx.shadowColor='#ff44cc'; ctx.shadowBlur=8;
      ctx.translate(it.x,it.y);
      ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(5,2); ctx.lineTo(-5,2); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle='#44ffcc'; ctx.shadowColor='#44ffcc'; ctx.shadowBlur=8;
      ctx.fillRect(it.x-4,it.y-4,8,8);
    }
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawBossQuip() {
  if (bossQuipTimer <= 0 || !bossQuip) return;
  bossQuipTimer--;

  // fade in first 30 frames, fade out last 60 frames, full opacity in between
  const TOTAL = 300;
  const elapsed = TOTAL - bossQuipTimer;
  let alpha;
  if (elapsed < 30)              alpha = elapsed / 30;
  else if (bossQuipTimer < 60)   alpha = bossQuipTimer / 60;
  else                           alpha = 1;

  const pad = 12;
  const maxW = 280;
  ctx.save();
  ctx.font = '12px "Noto Serif JP"';

  // word-wrap
  const words = bossQuip.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxW - pad*2) { lines.push(cur); cur = w; }
    else cur = test;
  }
  if (cur) lines.push(cur);

  const lineH = 18;
  const nameH = 18;
  const boxW = maxW;
  const boxH = nameH + lines.length * lineH + pad * 2;
  const bx = W/2 - boxW/2;
  const by = 110;   // sits just below the boss

  ctx.globalAlpha = alpha;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(bx+3, by+3, boxW, boxH, 8);
  ctx.fill();

  // box
  ctx.fillStyle = '#0a0018';
  ctx.strokeStyle = '#cc44ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx, by, boxW, boxH, 8);
  ctx.fill();
  ctx.stroke();

  // top accent line
  ctx.strokeStyle = '#ff66cc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(bx+4, by+4, boxW-8, nameH+4, 4);
  ctx.stroke();

  // triangle pointer (points up toward boss)
  const tx = W/2;
  ctx.fillStyle = '#0a0018';
  ctx.strokeStyle = '#cc44ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tx-8, by);
  ctx.lineTo(tx+8, by);
  ctx.lineTo(tx,   by-10);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // speaker name (English part after the double-space)
  const displayName = bossQuipSpeaker || 'Boss';
  ctx.fillStyle = '#ff88cc';
  ctx.font = 'bold 11px "Noto Serif JP"';
  ctx.textAlign = 'left';
  ctx.fillText(displayName, bx + pad, by + pad + 11);

  // quip lines
  ctx.fillStyle = '#e8d0ff';
  ctx.font = '12px "Noto Serif JP"';
  lines.forEach((ln, i) => {
    ctx.fillText(ln, bx + pad, by + pad + nameH + 6 + i * lineH);
  });

  ctx.restore();
}

function updateDefeatScreen() {
  if (!defeatScreen) return;
  if (defeatPhase === 0) {
    defeatAlpha = Math.min(1, defeatAlpha + 0.03);
    defeatScale = Math.min(2.5, defeatScale + 0.04);
    if (defeatScale >= 2.5) { defeatPhase = 1; }
  } else if (defeatPhase === 1) {
    // hold – wait for Z press
  }
  // Z press to continue
  if (defeatPhase >= 1 && keys['KeyZ']) {
    keys['KeyZ'] = false;
    defeatScreen = false;
    advanceAfterBoss();
  }
}

function drawDefeatScreen() {
  if (!defeatScreen) return;
  // dim overlay
  ctx.fillStyle = `rgba(0,0,0,${defeatAlpha * 0.75})`;
  ctx.fillRect(0,0,W,H);

  // boss sprite scaled up
  const img = SPRITES[defeatBossKey];
  const dw = defeatBossW * defeatScale;
  const dh = defeatBossH * defeatScale;
  const dx = W/2 - dw/2;
  const dy = H/2 - dh/2 - 30;
  ctx.save();
  ctx.globalAlpha = defeatAlpha;
  ctx.imageSmoothingEnabled = true;
  if (img) ctx.drawImage(img, dx, dy, dw, dh);
  ctx.imageSmoothingEnabled = false;

  // defeat quip bubble
  if (defeatPhase >= 1) {
    const pad = 12, maxW = 300;
    ctx.font = '12px "Noto Serif JP"';
    const words = defeatQuipText.split(' ');
    const lines = []; let cur = '';
    for (const w of words) {
      const test = cur ? cur+' '+w : w;
      if (ctx.measureText(test).width > maxW-pad*2) { lines.push(cur); cur=w; }
      else cur=test;
    }
    if (cur) lines.push(cur);
    const lineH=18, boxH=lines.length*lineH+pad*2+16;
    const bx=W/2-maxW/2, by=dy+dh+8;
    ctx.globalAlpha = defeatAlpha;
    ctx.fillStyle='#0a0018'; ctx.strokeStyle='#cc44ff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,maxW,boxH,8); ctx.fill(); ctx.stroke();
    // triangle pointer
    ctx.fillStyle='#0a0018';
    ctx.beginPath(); ctx.moveTo(W/2-8,by); ctx.lineTo(W/2+8,by); ctx.lineTo(W/2,by-10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#cc44ff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W/2-8,by-1); ctx.lineTo(W/2,by-10); ctx.lineTo(W/2+8,by-1); ctx.stroke();
    ctx.fillStyle='#e8d0ff'; ctx.font='12px "Noto Serif JP"'; ctx.textAlign='left';
    lines.forEach((ln,i)=> ctx.fillText(ln, bx+pad, by+pad+12+i*lineH));
    // press Z prompt
    ctx.fillStyle=`rgba(200,180,255,${0.5+0.5*Math.sin(frame*0.1)})`;
    ctx.font='11px "Noto Serif JP"'; ctx.textAlign='center';
    ctx.fillText('Press Z to continue', W/2, by+boxH+16);
  }
  ctx.restore();
}

function drawTeleportTaunt() {
  if (bossTeleportTauntTimer <= 0) return;
  bossTeleportTauntTimer--;
  const alpha = bossTeleportTauntTimer < 40 ? bossTeleportTauntTimer/40 : 1;
  const pad=10, maxW=260;
  ctx.save();
  ctx.font='11px "Noto Serif JP"';
  const words=bossTeleportTaunt.split(' '); const lines=[]; let cur='';
  for(const w of words){const t=cur?cur+' '+w:w; if(ctx.measureText(t).width>maxW-pad*2){lines.push(cur);cur=w;}else cur=t;}
  if(cur) lines.push(cur);
  const bh=lines.length*16+pad*2+4;
  const bx=W/2-maxW/2, by=10;
  ctx.globalAlpha=alpha*0.95;
  ctx.fillStyle='#0a0018'; ctx.strokeStyle='#ff44ff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(bx,by,maxW,bh,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#ffaaff'; ctx.textAlign='left';
  lines.forEach((ln,i)=>ctx.fillText(ln,bx+pad,by+pad+12+i*16));
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle='rgba(180,120,255,0.25)';
  ctx.font='10px "Noto Serif JP"';
  ctx.textAlign='left';
  ctx.fillText('ESC: pause',6,H-6);
}

let lastUIFrame=0;
function updateUI() {
  document.getElementById('scoreDisplay').textContent=score.toLocaleString();
  document.getElementById('hiScoreDisplay').textContent=hiScore.toLocaleString();
  document.getElementById('stageDisplay').textContent=(extraMode?"✦":easyMode?"☆":babyMode?"✿":"")+stage;
  document.getElementById('powerDisplay').textContent=power.toFixed(1);
  document.getElementById('grazeDisplay').textContent=graze;
  // lives – show actual count (no fixed max)
  const ld=document.getElementById('livesDisplay'); ld.innerHTML='';
  const displayLives = Math.max(lives+1, 1);
  for(let i=0;i<displayLives;i++){
    const el=document.createElement('div');
    el.className='life-icon'+(i<=lives?'':' life-empty'); ld.appendChild(el);
  }
  // bombs
  const bd=document.getElementById('bombsDisplay'); bd.innerHTML='';
  for(let i=0;i<3;i++){
    const el=document.createElement('div');
    el.className='bomb-icon'+(i<bombs?'':' bomb-empty'); bd.appendChild(el);
  }
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  if (state==='loading') {
    ctx.fillStyle='#060010'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#cc44ff'; ctx.font='16px "Noto Serif JP"'; ctx.textAlign='center';
    ctx.fillText('Loading sprites…', W/2, H/2);
    return;
  }
  if (state!=='playing') return;
  if (paused) {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e0c0ff'; ctx.font='20px "Noto Serif JP"'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2);
    return;
  }
  frame++;
  scrollY += extraMode ? 2 : 0.6;  // fractional scroll accumulator
  if (invincible>0) invincible--;
  if (bombActive>0) bombActive--;

  if (defeatScreen) { updateDefeatScreen(); drawBG(); drawDefeatScreen(); return; }
  // Time freeze tick
  if (timeFreeze) {
    timeFreezeTimer--;
    timeFreezeAlpha = Math.min(0.35, timeFreezeAlpha + 0.04);
    if (timeFreezeTimer <= 0) { timeFreeze=false; timeFreezeAlpha=0; }
  }
  handleInput();
  updateOrbs();
  updateHomingBullets();
  updateStage();
  if (bossActive) bossBehavior();
  updateLaserCharges();
  updateEnemies();
  updateBullets();
  updateEnemyBullets();
  updateItems();
  updateParticles();

  drawBG();
  drawItems();
  drawParticles();
  drawEnemyBullets();
  drawEnemies();
  drawBoss();
  drawLaserCharges();
  drawBullets();
  drawPlayer();
  // Time freeze blue tint overlay
  if (timeFreezeAlpha > 0) {
    ctx.save();
    ctx.fillStyle=`rgba(30,100,220,${timeFreezeAlpha})`;
    ctx.fillRect(0,0,W,H);
    // frost edge vignette
    const grad=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);
    grad.addColorStop(0,'rgba(0,60,160,0)');
    grad.addColorStop(1,`rgba(0,30,120,${timeFreezeAlpha*0.8})`);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // "TIME STOPPED" text
    ctx.fillStyle=`rgba(180,220,255,${timeFreezeAlpha*2})`;
    ctx.font='bold 14px "Noto Serif JP"';
    ctx.textAlign='center';
    ctx.fillText('⏸ TIME STOPPED', W/2, H/2);
    ctx.restore();
  }
  drawBossQuip();
  drawTeleportTaunt();
  drawDefeatScreen();
  drawHUD();

  if (frame-lastUIFrame>10) { updateUI(); lastUIFrame=frame; }
}

// ═══════════════════════════════════════════════════════════════
//  MUSIC SYSTEM
// ═══════════════════════════════════════════════════════════════
const MusicPlayer = (() => {
  let current = null;      // currently playing Audio
  let fadeInterval = null; // active fade setInterval

  function clearFade() {
    if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
  }

  function stopAll() {
    clearFade();
    if (current) { current.pause(); current.currentTime = 0; current = null; }
  }

  // Fade out current track, then call onDone (optional)
  function fadeOut(duration = 800, onDone) {
    clearFade();
    if (!current) { if (onDone) onDone(); return; }
    const track = current;
    const startVol = track.volume;
    const steps = 30;
    const stepTime = duration / steps;
    const stepAmt  = startVol / steps;
    fadeInterval = setInterval(() => {
      track.volume = Math.max(0, track.volume - stepAmt);
      if (track.volume <= 0) {
        clearFade();
        track.pause(); track.currentTime = 0;
        if (current === track) current = null;
        if (onDone) onDone();
      }
    }, stepTime);
  }

  // Start a new track fading in from 0 to targetVol
  function fadeIn(src, loop = true, targetVol = 0.75, duration = 1200) {
    const audio = new Audio(src);
    audio.loop = loop;
    audio.volume = 0;
    audio.play().catch(() => {}); // ignore autoplay block silently
    current = audio;
    clearFade();
    const steps = 30;
    const stepTime = duration / steps;
    const stepAmt  = targetVol / steps;
    fadeInterval = setInterval(() => {
      if (current !== audio) { clearFade(); return; } // superseded
      audio.volume = Math.min(targetVol, audio.volume + stepAmt);
      if (audio.volume >= targetVol) clearFade();
    }, stepTime);
    return audio;
  }

  // Cross-fade: fade out current then fade in new src
  function crossFade(src, loop = true, targetVol = 0.75, outDur = 800, inDur = 1200) {
    fadeOut(outDur, () => fadeIn(src, loop, targetVol, inDur));
  }

  // Gentle cross-fade (slower) for stage→stage
  function gentleCrossFade(src, loop = true) {
    crossFade(src, loop, 0.7, 1200, 1600);
  }

  return { fadeOut, fadeIn, crossFade, gentleCrossFade, stopAll };
})();

// ── Music path helpers ──────────────────────────────────────────
function stageMusicSrc(stageNum) {
  return `assets/music/level ${stageNum}/stage.mp3`;
}
function bossMusicSrc(stageNum) {
  return `assets/music/level ${stageNum}/boss.mp3`;
}
const TITLE_MUSIC_SRC = 'assets/music/title/title.mp3';

// ── Hooks called at key game events ────────────────────────────
function musicOnTitle() {
  MusicPlayer.crossFade(TITLE_MUSIC_SRC, true, 0.7);
}
function musicOnStageStart(stageNum) {
  MusicPlayer.gentleCrossFade(stageMusicSrc(stageNum), true);
}
function musicOnBossSpawn(stageNum) {
  // Fade out stage music quickly, fade in boss music
  MusicPlayer.crossFade(bossMusicSrc(stageNum), true, 0.8, 600, 900);
}
function musicOnBossDefeated(nextStageNum) {
  // Boss music fades out, then stage music fades in gently
  MusicPlayer.crossFade(stageMusicSrc(nextStageNum), true, 0.7, 1000, 1800);
}
function musicOnVictory() {
  MusicPlayer.fadeOut(1500);
}
